# Configure .zshrc
# Set backup/overwrite flags in `vars/main.yml`
---
- name: "[Config][ZSH] Get exact node version"
  ansible.builtin.shell: |
    set -e -o pipefail
    . {{ ansible_facts['env']['HOME'] }}/.local/opt/nvm/nvm.sh
    nvm use {{ node_version | default('default') }} 2>&1 1>/dev/null
    nvm list current | grep -Eo 'v[0-9]*\.[0-9]*\.[0-9]*'
  args:
    executable: /bin/bash
  changed_when: false
  failed_when: false
  register: actual_node_version

- name: "[Config][ZSH] Resolve EZA version for FPATH"
  ansible.builtin.shell: |
    set -e -o pipefail
    ls -1d {{ ansible_facts['env']['HOME'] }}/.local/opt/eza-* 2>/dev/null | sort -V | tail -1 | xargs -I{} basename {} | cut -d'-' -f2
  args:
    executable: /bin/bash
  changed_when: false
  failed_when: false
  register: eza_installed_version
  when: eza_version is not defined

- name: "[Config][ZSH] Set eza_version fact from installed directory"
  ansible.builtin.set_fact:
    eza_version: "{{ eza_installed_version.stdout }}"
  when: eza_version is not defined and eza_installed_version.stdout | length > 0

- name: "[Config][ZSH] Configure .zshrc"
  vars:
    app: ZSH
    source_template: zshrc.j2
    target_file: "{{ ansible_facts['env']['HOME'] }}/.zshrc"
  ansible.builtin.include_role:
    name: common
    tasks_from: config_file.yml
